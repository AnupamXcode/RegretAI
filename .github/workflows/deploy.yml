name: Deploy RegretAI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ====================================
  # BUILD & TEST JOB
  # ====================================
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    # Setup Node.js for Frontend and Backend
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Build and test client
    - name: Install Client Dependencies
      run: cd client && npm install
    
    - name: Build Client
      run: cd client && npm run build
    
    - name: Lint Client Code
      run: cd client && npm run lint --if-present
      continue-on-error: true

    # Build server
    - name: Install Server Dependencies
      run: cd server && npm install

    # Setup Python for AI Model
    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    # Install and test AI model
    - name: Install AI Model Dependencies
      run: |
        cd ai-model
        pip install -r requirements.txt

    - name: Test AI Model Import
      run: |
        cd ai-model
        python -c "import model; print('Model imported successfully')"
      continue-on-error: true

  # ====================================
  # DEPLOY FRONTEND (GitHub Pages)
  # ====================================
  deploy-frontend:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: cd client && npm install

    - name: Build Frontend
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://regretai-server.onrender.com' }}
      run: cd client && npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./client/dist

    - name: Frontend Deployment Status
      run: echo "✅ Frontend deployed to GitHub Pages"

  # ====================================
  # DEPLOY BACKEND (Docker to Registry)
  # ====================================
  deploy-backend-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: secrets.DOCKER_USERNAME != ''

    - name: Build and Push Backend to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./server/Dockerfile
        push: ${{ secrets.DOCKER_USERNAME != '' && github.event_name == 'push' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/regretai-server:latest
          ${{ secrets.DOCKER_USERNAME }}/regretai-server:${{ github.sha }}
      if: secrets.DOCKER_USERNAME != ''

    - name: Backend Docker Build Complete
      run: echo "✅ Backend Docker image built and pushed"

  # ====================================
  # DEPLOY AI MODEL (Docker to Registry)
  # ====================================
  deploy-ai-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: secrets.DOCKER_USERNAME != ''

    - name: Build and Push AI Model to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ai-model/Dockerfile
        push: ${{ secrets.DOCKER_USERNAME != '' && github.event_name == 'push' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/regretai-ai:latest
          ${{ secrets.DOCKER_USERNAME }}/regretai-ai:${{ github.sha }}
      if: secrets.DOCKER_USERNAME != ''

    - name: AI Model Docker Build Complete
      run: echo "✅ AI Model Docker image built and pushed"

  # ====================================
  # NOTIFY DEPLOYMENT STATUS
  # ====================================
  deployment-complete:
    needs: [deploy-frontend, deploy-backend-docker, deploy-ai-docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deployment Success
      run: |
        echo "🚀 RegretAI Deployment Complete!"
        echo "Frontend: GitHub Pages"
        echo "Backend: Docker Hub / Render.com"
        echo "AI Model: Docker Hub"
